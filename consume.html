<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7b6c8" />
  <title>花丸を消費</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: light;
      --paper: #fffdf8;
      --ink: #3d2b2d;
      --muted: #806f71;
      --line: #ead7c9;
      --accent: #f08dac;
      --accent-strong: #db5d82;
      --accent-soft: #ffe2eb;
      --gold: #f7c948;
      --shadow: 0 8px 20px rgba(117, 76, 52, .10);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 16px 16px, rgba(240, 141, 172, .13) 0 2px, transparent 3px), linear-gradient(180deg, #fff8ef 0%, #fff1e6 54%, #fff7ef 100%);
      background-size: 34px 34px, auto;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", sans-serif;
      line-height: 1.42;
      -webkit-text-size-adjust: 100%;
    }
    button, input { font: inherit; color: inherit; }
    button { border: 0; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .app { width: min(720px, 100%); margin: 0 auto; padding: 10px 8px calc(22px + var(--safe-bottom)); }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -10px -8px 10px;
      padding: calc(10px + env(safe-area-inset-top, 0px)) 8px 8px;
      background: rgba(255, 247, 239, .94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(234, 215, 201, .70);
    }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    h1 { margin: 0; font-size: 22px; display: flex; align-items: center; gap: 6px; }
    h2 { margin: 0 0 8px; font-size: 17px; }
    .back { min-height: 38px; padding: 7px 11px; border-radius: 13px; background: #fff; border: 1px solid var(--line); font-weight: 850; text-decoration: none; color: var(--ink); }
    .card { background: rgba(255, 253, 248, .94); border: 1px solid rgba(234, 215, 201, .86); border-radius: 18px; box-shadow: var(--shadow); padding: 12px; margin-bottom: 10px; }
    .balance { display: flex; align-items: baseline; gap: 8px; margin: 6px 0 4px; }
    .balance b { color: var(--accent-strong); font-size: 42px; line-height: 1; }
    .muted { color: var(--muted); font-size: 13px; margin: 0; }
    .controls { display: grid; gap: 8px; }
    label { font-size: 13px; color: var(--muted); font-weight: 850; }
    input { width: 100%; border: 1px solid var(--line); border-radius: 13px; background: #fff; padding: 11px 12px; min-height: 44px; outline: none; }
    input:focus { border-color: rgba(219, 93, 130, .55); box-shadow: 0 0 0 3px rgba(240, 141, 172, .16); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { min-height: 44px; padding: 10px 13px; border-radius: 14px; background: #fff; border: 1px solid var(--line); font-weight: 850; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.gold { background: #ffef9b; border-color: #f3d45a; color: #6d4d00; }
    .quick { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .quick .btn { flex: 0 0 auto; min-height: 38px; padding: 7px 10px; }
    .history { display: grid; gap: 7px; }
    .item { padding: 9px 10px; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
    .item strong { color: var(--accent-strong); }
    .empty { padding: 14px 10px; color: var(--muted); text-align: center; border: 1px dashed var(--line); border-radius: 15px; background: rgba(255,255,255,.42); font-size: 13px; }
    .toast { position: fixed; left: 10px; right: 10px; bottom: calc(12px + var(--safe-bottom)); z-index: 30; max-width: 560px; margin: 0 auto; padding: 11px 13px; border-radius: 16px; background: rgba(61, 43, 45, .92); color: #fff; box-shadow: 0 10px 28px rgba(0,0,0,.22); display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top">
        <h1><span aria-hidden="true">🌸</span><span>花丸消費</span></h1>
        <a class="back" href="./">札へ戻る</a>
      </div>
    </header>

    <section class="card">
      <h2>現在の花丸</h2>
      <div class="balance"><b id="balance">0</b><span>個</span></div>
      <p class="muted">ご褒美に使ったぶんだけ残高から引く。累計ログはJSONに一緒に残る。</p>
    </section>

    <section class="card controls">
      <label>消費する花丸数</label>
      <input id="cost" type="number" min="1" inputmode="numeric" placeholder="例：100" />
      <div class="quick">
        <button class="btn" type="button" data-cost="10">10</button>
        <button class="btn" type="button" data-cost="30">30</button>
        <button class="btn" type="button" data-cost="50">50</button>
        <button class="btn" type="button" data-cost="100">100</button>
      </div>
      <label>ご褒美メモ</label>
      <input id="title" type="text" placeholder="例：紅茶を買う" />
      <button class="btn primary" id="consume" type="button">花丸を消費する</button>
    </section>

    <section class="card">
      <h2>消費履歴</h2>
      <div class="history" id="history"></div>
    </section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = 'hanamaru-fuda-v2';
    const $ = (id) => document.getElementById(id);

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch (error) { return {}; }
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function currentBalance() {
      return Math.max(0, Math.floor(Number(loadState().totalStamps) || 0));
    }

    function formatDateTime(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[c]));
    }

    let toastTimer = null;
    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    function render() {
      const state = loadState();
      $('balance').textContent = String(Math.max(0, Math.floor(Number(state.totalStamps) || 0)));
      const history = Array.isArray(state.rewardHistory) ? state.rewardHistory : [];
      $('history').innerHTML = history.length
        ? history.slice(0, 20).map(item => `<div class="item"><strong>-${Number(item.cost) || 0}</strong> 花丸　${formatDateTime(item.createdAt)}<br>${escapeHtml(item.title || 'ご褒美')}</div>`).join('')
        : '<div class="empty">消費履歴なし。</div>';
    }

    function consume() {
      const cost = Math.floor(Number($('cost').value));
      const title = $('title').value.trim() || 'ご褒美';
      const state = loadState();
      const balance = Math.max(0, Math.floor(Number(state.totalStamps) || 0));
      if (!Number.isFinite(cost) || cost <= 0) {
        toast('消費する花丸数を入れる。');
        return;
      }
      if (cost > balance) {
        toast(`花丸が足りない。現在 ${balance}個。`);
        return;
      }
      state.version = state.version || 2;
      state.totalStamps = balance - cost;
      state.rewardHistory = Array.isArray(state.rewardHistory) ? state.rewardHistory : [];
      state.rewardHistory.unshift({
        id: `r_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`,
        createdAt: new Date().toISOString(),
        cost,
        title,
      });
      state.rewardHistory = state.rewardHistory.slice(0, 20);
      saveState(state);
      $('cost').value = '';
      $('title').value = '';
      render();
      toast(`花丸 ${cost}個を消費。残り ${state.totalStamps}個。`);
    }

    document.querySelectorAll('[data-cost]').forEach(btn => {
      btn.addEventListener('click', () => $('cost').value = btn.dataset.cost);
    });
    $('consume').addEventListener('click', consume);
    render();
  </script>
</body>
</html>
